<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>(function(){try{if(localStorage.getItem('stackly_theme')==='light'){document.documentElement.setAttribute('data-theme','light');}}catch(e){}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Stackly</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/img/stackly-logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .notfound-shell{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden; padding:40px 24px; text-align:center;
  }
  .notfound-shell::before, .notfound-shell::after{
    content:""; position:absolute; width:520px; height:520px; border-radius:50%;
    background:radial-gradient(circle, rgba(216,171,99,.16), transparent 70%);
    filter:blur(6px); animation:floatBlob 16s ease-in-out infinite;
  }
  .notfound-shell::before{ top:-160px; left:-140px; }
  .notfound-shell::after{ bottom:-200px; right:-160px; animation-delay:-8s; animation-duration:20s; }
  .notfound-inner{ position:relative; max-width:560px; }
  .notfound-logo{ display:inline-flex; align-items:center; gap:0; margin-bottom:48px; font-family:var(--font-display); font-weight:700; font-size:19px; }
  .notfound-logo .logo-icon{ width:30px; height:30px; }
  .notfound-code{
    font-family:var(--font-display); font-weight:800; line-height:.9;
    font-size:clamp(90px,18vw,160px); color:var(--gold);
    -webkit-text-stroke:2px var(--gold); letter-spacing:-.02em;
    display:flex; justify-content:center; gap:6px; margin-bottom:8px;
  }
  .notfound-code span{ display:inline-block; animation:codeFloat 3.2s ease-in-out infinite; }
  .notfound-code span:nth-child(2){ animation-delay:.15s; color:var(--gold); -webkit-text-stroke:0; }
  .notfound-code span:nth-child(3){ animation-delay:.3s; }
  @keyframes codeFloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-10px); } }
  .notfound-pill{
    display:inline-flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:12px;
    text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin-bottom:22px;
  }
  .notfound-pill span{ width:6px; height:6px; border-radius:50%; background:var(--bad); }
  .notfound-inner h1{ font-size:clamp(24px,3.4vw,34px); margin-bottom:16px; }
  .notfound-inner p{ color:var(--muted); font-size:15.5px; max-width:44ch; margin:0 auto 40px; }
  .notfound-actions{ display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap; }
</style>
</head>
<body>
<div class="page-loader" id="pageLoader" data-duration="3000">
  <div class="loader-inner">
    <div class="loader-brand">
      <span class="loader-icon-wrap">
        <span class="ripple-ring r1"></span>
        <span class="ripple-ring r2"></span>
        <span class="ripple-ring r3"></span>
        <span class="logo-icon loader-brand-icon" role="img" aria-label="Stackly logo"></span>
      </span>
      <span class="loader-brand-word">Stack<b>ly</b></span>
    </div>
    <div class="loader-bar-track"><span class="loader-bar-fill"></span></div>
  </div>
</div>


<div class="notfound-shell">
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle light and dark theme" style="position:absolute; top:24px; right:24px;">
    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M20.7 15.3A8.5 8.5 0 0 1 8.7 3.3a1 1 0 0 0-1.3-1.2A10 10 0 1 0 21.9 16.6a1 1 0 0 0-1.2-1.3z"/></svg>
  </button>
  <div class="notfound-inner">
    <a href="index.html" class="notfound-logo">
      <span class="logo-icon" role="img" aria-label="Stackly logo"></span>
      <span>Stack<span style="color:var(--gold);">ly</span></span>
    </a>

    <div class="notfound-code"><span>4</span><span>0</span><span>4</span></div>

    <p class="notfound-pill"><span></span>This page isn't built yet</p>

    <h1>Looks like this path doesn't exist</h1>
    <p>The page you're looking for may have been moved, renamed, or is still on our roadmap.
      Let's get you back to solid ground.</p>

    <div class="notfound-actions">
      <button class="btn btn-solid lg" id="goBackBtn">← Go back</button>
      <a href="index.html" class="btn btn-line lg">Back to home</a>
    </div>
  </div>
</div>

<script src="assets/js/effects.js"></script>
<script>
  document.getElementById('goBackBtn').addEventListener('click', () => {
    var sameSiteReferrer = document.referrer && document.referrer.indexOf(window.location.host) !== -1;
    if (sameSiteReferrer) {
      window.history.back();
      // Safety net: if we're still here shortly after, there was nowhere to go back to.
      setTimeout(() => {
        if (document.visibilityState !== 'hidden') { window.location.href = 'index.html'; }
      }, 600);
    } else {
      window.location.href = 'index.html';
    }
  });
</script>
</body>
</html>
